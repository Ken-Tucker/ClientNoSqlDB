# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET
permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
env:
   package_feed: "https://nuget.pkg.github.com/vb2ae/index.json"
   
jobs:
  build:

    runs-on: windows-2025

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Setup Java SDK
      uses: actions/setup-java@v5
      with:
        distribution: 'microsoft' 
        java-version: 17

    - name: Install Microsoft SBom tool
      run: dotnet tool install --global Microsoft.Sbom.DotNetTool
  
    - name: Install ReportGenerator tool
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Install Nerdbank Git versioning
      run: dotnet tool install -g nbgv    
    - name: Set Version
      run: nbgv cloud
    - name: search workloads
      run: dotnet workload search
    - name: restore workloads
      run: dotnet workload install maui maui-android maui-ios maui-tizen maui-maccatalyst maui-windows android --source https://api.nuget.org/v3/index.json
    - name: list workloads
      run: dotnet workload list 
    - name: Restore dependencies
      run: dotnet restore -s https://www.myget.org/F/caliburn-micro-builds/api/v3/index.json -s https://api.nuget.org/v3/index.json

    - name: Checking Vulnerable Nuget Packages
      run: |
        $outout = dotnet list package --vulnerable --include-transitive 2>&1 | tee build.log
        echo "Analyze dotnet vulnerable nuget package command log output..."
        echo $output
        if ($output -match "critical|high|moderate|low") {
            Write-Host "Security Vulnerabilities found in Nuget Packages on the log output"
            exit 1
        }
    - name: Build
      run: dotnet build --configuration Release 
    - name: Run Tests with Coverage
      run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./coverage

      # Generate HTML report and a Markdown summary for GitHub
    - name: Generate coverage report
      env:
          PATH: '${{ env.HOME }}\.dotnet\tools;${{ env.PATH }}'
      run: |
          # Find all Cobertura files produced by dotnet test
          REPORTS=$(echo TestResults/**/coverage.cobertura.xml)
          # Create output directory
          mkdir -p coverage-report
          # Generate HTML + Markdown summary for GitHub
          reportgenerator \
            -reports:"$REPORTS" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;MarkdownSummaryGithub"

      # Publish coverage HTML and raw Cobertura XML as artifacts
    - name: Upload coverage (HTML)
      uses: actions/upload-artifact@v4
      with:
          name: coverage-html
          path: coverage-report

    - name: Pack Nuget
      run: dotnet pack ClientNoSqlDB/ClientNoSqlDB.csproj --configuration Release 
    - name: publish Nuget Packages to GitHub
      run: dotnet nuget push ${{ vars.UPLOAD_NUGET_PATH }} --source ${{env.package_feed}} --api-key ${{secrets.PUBLISH_NUGET_PACKAGE}} --skip-duplicate      
      if: github.event_name != 'pull_request'
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: published_nuget
        path: ClientNoSqlDB/bin/Release/*.nupkg


